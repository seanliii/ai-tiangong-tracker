];
const categories={all:"全部",milestone:"商业化里程碑",product:"产品矩阵",tech:"技术突破",finance:"市场表现",strategy:"战略动态",impact:"行业影响"};
const categoryColors={milestone:"badge-milestone",product:"badge-product",tech:"badge-tech",finance:"badge-finance",strategy:"badge-strategy",impact:"badge-impact"};
let currentFilter="all",currentView="card",searchQuery="";
function init(){renderStats();renderContent();bindEvents()}
function renderStats(){const stats=[{value:"$8亿",label:"ARR总额",delta:"Q2突破"},{value:"$7亿",label:"短剧ARR",delta:"占比87.5%"},{value:"$1亿",label:"工具ARR",delta:"快速增长"},{value:"6个",label:"产品矩阵",delta:"完整闭环"},{value:"3个",label:"基座模型",delta:"全球领先"},{value:"+12.19%",label:"股价涨幅",delta:"07-02单日"}];document.getElementById("statsPanel").innerHTML=stats.map(s=>`<div class="stat-card"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>${s.delta?`<div class="stat-delta">${s.delta}</div>`:""}</div>`).join("")}
function getFilteredData(){let data=tiangongData;if(currentFilter!=="all")data=data.filter(d=>d.category===currentFilter);if(searchQuery)data=data.filter(d=>d.title.toLowerCase().includes(searchQuery.toLowerCase())||d.desc.toLowerCase().includes(searchQuery.toLowerCase())||d.tags.some(t=>t.toLowerCase().includes(searchQuery.toLowerCase())));return data}
function renderContent(){const data=getFilteredData();const content=document.getElementById("content");if(data.length===0){content.innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><div>没有找到匹配的项目</div></div>';return}document.querySelector(".card-grid")&&(document.querySelector(".card-grid").style.display="none");document.querySelector(".timeline-view")&&(document.querySelector(".timeline-view").style.display="none");document.querySelector(".table-view")&&(document.querySelector(".table-view").style.display="none");if(currentView==="card")renderCards(data);else if(currentView==="timeline")renderTimeline(data);else if(currentView==="table")renderTable(data)}
function renderCards(data){const content=document.getElementById("content");content.innerHTML=`<div class="card-grid">${data.map(item=>`<div class="card" onclick="openModal(${item.id})"><div class="card-header"><div class="card-title">${item.title}</div><span class="card-badge ${categoryColors[item.category]}">${categories[item.category]}</span></div><div class="card-date">${item.date}</div><div class="card-desc">${item.desc}</div><div class="card-footer">${item.tags.map(t=>`<span class="card-tag">${t}</span>`).join("")}</div></div>`).join("")}</div>`}
function renderTimeline(data){const content=document.getElementById("content");content.innerHTML=`<div class="timeline-view" style="display:block"><div class="timeline">${data.map(item=>`<div class="timeline-item"><div class="timeline-date">${item.date} · ${categories[item.category]}</div><div class="timeline-title">${item.title}</div><div class="timeline-desc">${item.desc}</div></div>`).join("")}</div></div>`}
function renderTable(data){const content=document.getElementById("content");content.innerHTML=`<div class="table-view" style="display:block"><table><thead><tr><th>日期</th><th>标题</th><th>分类</th><th>描述</th><th>标签</th></tr></thead><tbody>${data.map(item=>`<tr onclick="openModal(${item.id})"><td>${item.date}</td><td>${item.title}</td><td><span class="table-badge ${categoryColors[item.category]}">${categories[item.category]}</span></td><td>${item.desc}</td><td>${item.tags.join(", ")}</td></tr>`).join("")}</tbody></table></div>`}
function filterCategory(cat){currentFilter=cat;document.querySelectorAll(".filter-btn").forEach(btn=>{btn.classList.toggle("active",btn.dataset.filter===cat)});renderContent()}
function handleSearch(query){searchQuery=query.trim();if(searchQuery){currentFilter="all";document.querySelectorAll(".filter-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.filter==="all"))}renderContent()}
function switchView(view){currentView=view;document.querySelectorAll(".view-btn").forEach(btn=>{btn.classList.toggle("active",btn.dataset.view===view)});renderContent()}
function openModal(id){const item=tiangongData.find(d=>d.id===id);if(!item)return;document.getElementById("modalTitle").textContent=item.title;document.getElementById("modalBody").innerHTML=`<div class="modal-section"><div class="modal-section-title">项目概述</div><div class="modal-section-content">${item.desc}</div></div><div class="modal-section"><div class="modal-section-title">关键信息</div><div class="modal-section-content"><ul>${item.keyInfo.map(k=>`<li>${k}</li>`).join("")}</ul></div></div><div class="modal-section"><div class="modal-section-title">核心亮点</div><div class="modal-section-content"><ul>${item.highlights.map(h=>`<li>${h}</li>`).join("")}</ul></div></div><div class="modal-section"><div class="modal-section-title">信息来源</div><div class="modal-section-content">${item.sources.map(s=>`<a href="${s.url}" target="_blank" class="modal-link">${s.title} ↗</a><br>`).join("")}</div></div>`;document.getElementById("modal").classList.add("active")}
function closeModal(e){if(!e||e.target.id==="modal"||e.target.classList.contains("modal-close")){document.getElementById("modal").classList.remove("active")}}
function bindEvents(){document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()})}
init();
</script>
</body>
</html>
